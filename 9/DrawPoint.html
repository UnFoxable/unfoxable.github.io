<!doctype html>
<html lang="en-US">
<!--#09-->
<head>
  <title>Default</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <meta http-equiv="refresh" content="1"> -->
  <link href="./Styles9.css" rel="stylesheet"/>
</head>
<body>
  <div>
    <!-- <canvas id="referenceimg"></canvas> -->
    <canvas id="displayimg"></canvas>
  </div>
  <div class="tools" id="toolbar" onmouseout="drawOn()" onmouseover="drawoff()">

    <span>
      <input class="item input" id="pickcolour" value="#ffffff" type="color">
      <button class="item">Colour</button>
    </span>

    <input class="item num" id="inptwidth" value="3" type="number">
    
    <span>
      <label for="dwld" class="item">Download
        <a href="" id="dwld" download>item</a>
      </label>
    </span>

    <button class="item" id="import">Import*</button>

    <span>
      <label class="item" for="smthtype">Smooth
        <input class="item" id="smthtype" type="range" min="0" max="2" value="0">
      </label>
    </span>

    <button class="item" id="clear" onclick="trash()">Clear</button>
    <span class="item">
      <label class="sized" for="size">Size</label>
      <!-- <input class="sized" id="size" type="range" min="1" max="5" value="3"> -->
      <button class="sized" id="sizeS">-</button>
      <button class="sized" id="sizeL">+</button>
    </span>
    <span class="item">
      <label class="sized" for="movement">Move</label>
      <!-- <input class="sized" id="size" type="range" min="1" max="5" value="3"> -->
      <button class="sized" id="moveL">&#129032;</button>
      <button class="sized" id="moveR">&#129034;</button>
      <button class="sized" id="moveU">&#129033;</button>
      <button class="sized" id="moveD">&#129035;</button>
    </span>

  </div>
<script src="./Javascript9.js" type="text/javascript"></script>
</body>
</html>
