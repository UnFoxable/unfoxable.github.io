<!doctype html>
<html lang="en-US">
<!--#09-->
<head>
  <title>Default</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <meta http-equiv="refresh" content="1"> -->
  <link href="./Styles9.css" rel="stylesheet"/>
</head>
<body>
  <div>
    <!-- <canvas id="referenceimg"></canvas> -->
    <canvas id="displayimg"></canvas>
  </div>
  <!-- <content> -->
  <div id="toolbar" onmouseout="drawOn()" onmouseover="drawoff()">

    <span>
      <input class="item input" id="pickcolour" value="#ffffff" type="color">
      <button class="item">Colour</button>
    </span>

    <input class="item num" id="inptwidth" value="3" type="number">
    
    <span class="item">
      <a class="sized" id="dwld" target="_blank" href="">open</a>
      <a class="sized" id="dwld2" href="" download>Download</a>
    </span>

    <span class="item">
      <button class="sized" id="import">Import</button>
      <button class="sized" id="fileurl">File/URL</button>
      <input class="sized" id="importfile" type="file" accept=".png,.jpg,.jpeg">
      <input class="sized" hidden id="importurl" type="url" size="10">
    </span>

    <span>
      <label class="item" for="smthtype">Smooth
        <input class="item" id="smthtype" type="range" min="0" max="3" value="0">
      </label>
    </span>

    <button class="item" id="clear" onclick="trash()">Clear</button>
    
    <span class="item">
      <label class="sized" for="size">Size</label>
      <!-- <input class="sized" id="size" type="range" min="1" max="5" value="3"> -->
      <button class="sized" id="sizeS">-</button>
      <button class="sized" id="sizeL">+</button>
    </span>

    <span class="item">
      <label class="sized" for="movement">Move</label>
      <!-- <input class="sized" id="size" type="range" min="1" max="5" value="3"> -->
      <button class="sized" id="moveL">&#129032;</button>
      <button class="sized" id="moveR">&#129034;</button>
      <button class="sized" id="moveU">&#129033;</button>
      <button class="sized" id="moveD">&#129035;</button>
    </span>

    <span class="item">
      <label class="sized" for="undoredo">Undo/Redo</label>
      <!-- <input class="sized" id="size" type="range" min="1" max="5" value="3"> -->
      <button class="sized" id="undoR">&#129032;</button>
      <button class="sized" id="redoU">&#129034;</button>
    </span>

  </div>
  <!-- </content> -->
<script src="./Javascript9.js" type="text/javascript"></script>
</body>
</html>
